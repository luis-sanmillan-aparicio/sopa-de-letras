<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sopa de Letras</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#00f5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sopa" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    :root {
      --bg: #0a0a12;
      --surface: #12121e;
      --border: #1e1e32;
      --cyan: #00f5ff;
      --magenta: #ff00aa;
      --yellow: #ffe600;
      --green: #00ff88;
      --text: #c8c8e0;
      --dim: #555570;
      --found: #00ff88;
      --selected: rgba(0,245,255,0.25);
      --cell: 36px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 32px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan), 0 0 30px rgba(0,245,255,0.3);
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      margin-top: 4px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 16px;
      width: 100%;
      max-width: 560px;
    }
    select, button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s;
      outline: none;
    }
    select:hover, button:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }
    button.primary {
      border-color: var(--cyan);
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan);
    }
    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* ── Timer & Stats ── */
    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 14px;
      font-size: 0.78rem;
      color: var(--dim);
      letter-spacing: 0.1em;
    }
    .stats span b {
      color: var(--cyan);
    }
    #timer { color: var(--yellow); }

    /* ── Grid ── */
    #grid-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    #grid {
      display: grid;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      user-select: none;
      touch-action: none;
      box-shadow: 0 0 24px rgba(0,245,255,0.04);
    }
    .cell {
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.08s, color 0.08s;
      color: var(--text);
      position: relative;
    }
    .cell.selecting {
      background: var(--selected);
      color: var(--cyan);
    }
    .cell.found {
      background: rgba(0,255,136,0.12);
      color: var(--found);
      text-shadow: 0 0 6px var(--found);
      border-color: rgba(0,255,136,0.2);
    }

    /* ── Word List ── */
    #word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 560px;
      margin-bottom: 20px;
    }
    .word-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 5px 12px;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--text);
      transition: all 0.3s;
    }
    .word-chip.found {
      background: rgba(0,255,136,0.1);
      border-color: var(--found);
      color: var(--found);
      text-shadow: 0 0 6px var(--found);
      text-decoration: line-through;
      opacity: 0.7;
    }

    /* ── Status ── */
    #status {
      font-size: 0.8rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      height: 20px;
      text-align: center;
    }
    #status.ok { color: var(--green); }
    #status.err { color: var(--magenta); }

    /* ── Win overlay ── */
    #win {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,18,0.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    #win.show { display: flex; }
    #win h2 {
      font-size: 2rem;
      color: var(--green);
      text-shadow: 0 0 20px var(--green);
      letter-spacing: 0.2em;
    }
    #win p { color: var(--text); font-size: 0.9rem; }
    #win button { margin-top: 8px; }

    /* ── Loading ── */
    #loading {
      display: none;
      font-size: 0.8rem;
      color: var(--cyan);
      letter-spacing: 0.15em;
      animation: pulse 1s ease-in-out infinite;
    }
    #loading.show { display: block; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Mobile tweaks */
    @media (max-width: 400px) {
      :root { --cell: 30px; }
      .cell { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>⠿ SOPA DE LETRAS</h1>
  <div class="subtitle">arcade word search</div>
</header>

<div class="controls">
  <button class="primary" id="btn-new" onclick="newGame()" disabled>▶ NUEVA PARTIDA</button>
</div>

<div id="loading">CARGANDO PALABRAS…</div>

<div class="stats">
  <span>⏱ <b id="timer">00:00</b></span>
  <span>✓ <b id="found-count">0</b> / <b id="total-count">0</b></span>
</div>

<div id="grid-wrap">
  <div id="grid"></div>
</div>

<div id="word-list"></div>
<div id="status"></div>

<!-- Win overlay -->
<div id="win">
  <h2>¡COMPLETADA!</h2>
  <p id="win-msg"></p>
  <button class="primary" onclick="newGame()">▶ OTRA PARTIDA</button>
</div>

<script>
// ── Config ──────────────────────────────────────────
// Cambia esto a la URL de tu Vercel una vez desplegado.
// En local puedes usar: '/api/words'
const API_BASE = '/api/words';

const GRID_SIZE = 14;         // 14×14
const DIRECTIONS = [
  [0,1],[0,-1],[1,0],[-1,0],  // H y V
  [1,1],[1,-1],[-1,1],[-1,-1] // Diagonales
];

// ── Estado ──────────────────────────────────────────
let grid = [];        // char[][]
let cellEls = [];     // DOM refs
let words = [];       // palabras a buscar
let wordCells = {};   // word → [{r,c}]
let foundWords = new Set();
let selecting = false;
let selStart = null;
let selCells = [];
let timerInterval = null;
let seconds = 0;

// ── Init ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => newGame());

async function newGame() {
  clearTimer();
  foundWords.clear();
  selCells = [];
  selecting = false;
  document.getElementById('win').classList.remove('show');
  document.getElementById('loading').classList.add('show');
  document.getElementById('btn-new').disabled = true;
  setStatus('');

  try {
    const res = await fetch(API_BASE);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    words = data.words.map(w => w.toUpperCase().replace(/\s/g,''));
    document.getElementById('loading').classList.remove('show');
    document.getElementById('btn-new').disabled = false;

    buildGrid();
    renderGrid();
    renderWordList();
    updateCounts();
    startTimer();
  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('btn-new').disabled = false;
    setStatus('Error al obtener palabras: ' + e.message, 'err');
  }
}

// ── Grid builder ─────────────────────────────────────
function buildGrid() {
  grid = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(''));
  wordCells = {};

  // Intentar colocar cada palabra
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  for (const word of shuffled) {
    placeWord(word);
  }

  // Rellenar huecos con letras aleatorias
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for (let r = 0; r < GRID_SIZE; r++)
    for (let c = 0; c < GRID_SIZE; c++)
      if (!grid[r][c])
        grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
}

function placeWord(word) {
  const dirs = shuffle([...DIRECTIONS]);
  const positions = shuffle(
    Array.from({length: GRID_SIZE * GRID_SIZE}, (_, i) => [Math.floor(i/GRID_SIZE), i%GRID_SIZE])
  );

  for (const [r, c] of positions) {
    for (const [dr, dc] of dirs) {
      if (canPlace(word, r, c, dr, dc)) {
        doPlace(word, r, c, dr, dc);
        return true;
      }
    }
  }
  // Si no cabe, intentar sin diagonales
  return false;
}

function canPlace(word, r, c, dr, dc) {
  for (let i = 0; i < word.length; i++) {
    const nr = r + dr*i, nc = c + dc*i;
    if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) return false;
    if (grid[nr][nc] && grid[nr][nc] !== word[i]) return false;
  }
  return true;
}

function doPlace(word, r, c, dr, dc) {
  wordCells[word] = [];
  for (let i = 0; i < word.length; i++) {
    const nr = r + dr*i, nc = c + dc*i;
    grid[nr][nc] = word[i];
    wordCells[word].push({r: nr, c: nc});
  }
}

// ── Render ────────────────────────────────────────────
function renderGrid() {
  const el = document.getElementById('grid');
  el.style.gridTemplateColumns = `repeat(${GRID_SIZE}, var(--cell))`;
  el.innerHTML = '';
  cellEls = [];

  for (let r = 0; r < GRID_SIZE; r++) {
    cellEls[r] = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.textContent = grid[r][c];
      div.dataset.r = r;
      div.dataset.c = c;

      // Mouse
      div.addEventListener('mousedown', e => { e.preventDefault(); startSelect(r,c); });
      div.addEventListener('mouseover', () => { if (selecting) moveSelect(r,c); });
      div.addEventListener('mouseup', () => endSelect());

      // Touch
      div.addEventListener('touchstart', e => {
        e.preventDefault();
        startSelect(r,c);
      }, {passive:false});

      cellEls[r][c] = div;
      el.appendChild(div);
    }
  }

  document.addEventListener('mouseup', endSelect);
  document.addEventListener('touchend', endSelect);
  document.addEventListener('touchmove', e => {
    if (!selecting) return;
    e.preventDefault();
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (el && el.classList.contains('cell')) {
      moveSelect(+el.dataset.r, +el.dataset.c);
    }
  }, {passive: false});
}

function renderWordList() {
  const el = document.getElementById('word-list');
  el.innerHTML = '';
  for (const w of words) {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.id = `chip-${w}`;
    chip.textContent = w;
    el.appendChild(chip);
  }
}

// ── Selection logic ────────────────────────────────────
function startSelect(r, c) {
  selecting = true;
  selStart = {r, c};
  selCells = [{r, c}];
  highlightSelection();
}

function moveSelect(r, c) {
  if (!selStart) return;
  // Calcular dirección desde selStart a (r,c)
  const dr = r - selStart.r;
  const dc = c - selStart.c;
  const cells = [];

  if (dr === 0 && dc === 0) {
    cells.push(selStart);
  } else {
    // Normalizar a una de las 8 direcciones
    let stepR = 0, stepC = 0;
    if (Math.abs(dr) === Math.abs(dc)) { stepR = Math.sign(dr); stepC = Math.sign(dc); }
    else if (Math.abs(dr) > Math.abs(dc)) { stepR = Math.sign(dr); stepC = 0; }
    else { stepR = 0; stepC = Math.sign(dc); }

    const steps = Math.max(Math.abs(dr), Math.abs(dc));
    for (let i = 0; i <= steps; i++) {
      cells.push({r: selStart.r + stepR*i, c: selStart.c + stepC*i});
    }
  }
  selCells = cells;
  highlightSelection();
}

function endSelect() {
  if (!selecting) return;
  selecting = false;

  const word = selCells.map(({r,c}) => grid[r][c]).join('');
  const wordRev = word.split('').reverse().join('');

  let matched = null;
  if (words.includes(word) && !foundWords.has(word)) matched = word;
  else if (words.includes(wordRev) && !foundWords.has(wordRev)) matched = wordRev;

  if (matched) {
    foundWords.add(matched);
    markFound(matched);
    updateCounts();
    if (foundWords.size === words.length) winGame();
  } else {
    // Limpiar selección
    for (const {r,c} of selCells) {
      if (!isCellFound(r,c)) cellEls[r][c].classList.remove('selecting');
    }
  }
  selCells = [];
  selStart = null;
}

function highlightSelection() {
  // Reset selecting (no found)
  for (let r = 0; r < GRID_SIZE; r++)
    for (let c = 0; c < GRID_SIZE; c++)
      if (!isCellFound(r,c)) cellEls[r][c].classList.remove('selecting');

  for (const {r,c} of selCells) {
    if (!isCellFound(r,c)) cellEls[r][c].classList.add('selecting');
  }
}

function markFound(word) {
  if (!wordCells[word]) return;
  for (const {r,c} of wordCells[word]) {
    cellEls[r][c].classList.remove('selecting');
    cellEls[r][c].classList.add('found');
  }
  const chip = document.getElementById(`chip-${word}`);
  if (chip) chip.classList.add('found');
}

function isCellFound(r, c) {
  return cellEls[r][c].classList.contains('found');
}

// ── Timer ─────────────────────────────────────────────
function startTimer() {
  seconds = 0;
  updateTimer();
  timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000);
}
function clearTimer() {
  clearInterval(timerInterval);
}
function updateTimer() {
  const m = String(Math.floor(seconds/60)).padStart(2,'0');
  const s = String(seconds%60).padStart(2,'0');
  document.getElementById('timer').textContent = `${m}:${s}`;
}

// ── UI helpers ────────────────────────────────────────
function updateCounts() {
  document.getElementById('found-count').textContent = foundWords.size;
  document.getElementById('total-count').textContent = words.length;
}

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

function winGame() {
  clearTimer();
  const m = Math.floor(seconds/60), s = seconds%60;
  document.getElementById('win-msg').textContent =
    `Encontradas todas las palabras en ${m > 0 ? m+'m ' : ''}${s}s`;
  document.getElementById('win').classList.add('show');
}

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
